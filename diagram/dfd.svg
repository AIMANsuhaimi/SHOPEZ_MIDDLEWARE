<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 850" width="100%" height="100%" style="background-color: white; font-family: Arial, sans-serif;">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#000" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="500" y="40" font-size="20" font-weight="bold" text-anchor="middle" fill="#000">Level 1 Data Flow Diagram</text>

  <!-- Entity: Customer UI -->
  <rect x="425" y="100" width="150" height="50" fill="#fff" stroke="#000" stroke-width="1.5" />
  <text x="500" y="130" font-size="14" text-anchor="middle" fill="#000">Customer UI</text>

  <!-- Process: 1.0 Order API -->
  <rect x="425" y="220" width="150" height="70" rx="10" ry="10" fill="#fff" stroke="#000" stroke-width="1.5" />
  <line x1="425" y1="245" x2="575" y2="245" stroke="#000" stroke-width="1.5" />
  <text x="500" y="240" font-size="12" font-weight="bold" text-anchor="middle" fill="#000">1.0</text>
  <text x="500" y="265" font-size="14" text-anchor="middle" fill="#000">Order API</text>
  <text x="500" y="280" font-size="12" text-anchor="middle" fill="#000">(Producer)</text>

  <!-- Store D1: RabbitMQ -->
  <rect x="400" y="360" width="200" height="50" fill="#fff" stroke="#000" stroke-width="1.5" />
  <line x1="440" y1="360" x2="440" y2="410" stroke="#000" stroke-width="1.5" />
  <text x="420" y="390" font-size="14" font-weight="bold" text-anchor="middle" fill="#000">D1</text>
  <text x="520" y="385" font-size="14" text-anchor="middle" fill="#000">RabbitMQ Exchange</text>
  <text x="520" y="400" font-size="12" text-anchor="middle" fill="#000">(shopez_orders)</text>

  <!-- Process: 2.0 Payment -->
  <rect x="180" y="490" width="150" height="70" rx="10" ry="10" fill="#fff" stroke="#000" stroke-width="1.5" />
  <line x1="180" y1="515" x2="330" y2="515" stroke="#000" stroke-width="1.5" />
  <text x="255" y="510" font-size="12" font-weight="bold" text-anchor="middle" fill="#000">2.0</text>
  <text x="255" y="535" font-size="14" text-anchor="middle" fill="#000">Process</text>
  <text x="255" y="550" font-size="14" text-anchor="middle" fill="#000">Payment</text>

  <!-- Process: 3.0 Inventory -->
  <rect x="425" y="490" width="150" height="70" rx="10" ry="10" fill="#fff" stroke="#000" stroke-width="1.5" />
  <line x1="425" y1="515" x2="575" y2="515" stroke="#000" stroke-width="1.5" />
  <text x="500" y="510" font-size="12" font-weight="bold" text-anchor="middle" fill="#000">3.0</text>
  <text x="500" y="535" font-size="14" text-anchor="middle" fill="#000">Update</text>
  <text x="500" y="550" font-size="14" text-anchor="middle" fill="#000">Inventory</text>

  <!-- Process: 4.0 Log Order -->
  <rect x="670" y="490" width="150" height="70" rx="10" ry="10" fill="#fff" stroke="#000" stroke-width="1.5" />
  <line x1="670" y1="515" x2="820" y2="515" stroke="#000" stroke-width="1.5" />
  <text x="745" y="510" font-size="12" font-weight="bold" text-anchor="middle" fill="#000">4.0</text>
  <text x="745" y="535" font-size="14" text-anchor="middle" fill="#000">Log Order</text>
  <text x="745" y="550" font-size="14" text-anchor="middle" fill="#000">to DB</text>

  <!-- Store D2: Payment DB -->
  <rect x="180" y="630" width="150" height="50" fill="#fff" stroke="#000" stroke-width="1.5" />
  <line x1="220" y1="630" x2="220" y2="680" stroke="#000" stroke-width="1.5" />
  <text x="200" y="660" font-size="14" font-weight="bold" text-anchor="middle" fill="#000">D2</text>
  <text x="285" y="660" font-size="14" text-anchor="middle" fill="#000">Ledger DB</text>

  <!-- Store D3: Inventory DB -->
  <rect x="425" y="630" width="150" height="50" fill="#fff" stroke="#000" stroke-width="1.5" />
  <line x1="465" y1="630" x2="465" y2="680" stroke="#000" stroke-width="1.5" />
  <text x="445" y="660" font-size="14" font-weight="bold" text-anchor="middle" fill="#000">D3</text>
  <text x="520" y="660" font-size="14" text-anchor="middle" fill="#000">Stock DB</text>

  <!-- Store D4: Order DB -->
  <rect x="670" y="630" width="150" height="50" fill="#fff" stroke="#000" stroke-width="1.5" />
  <line x1="710" y1="630" x2="710" y2="680" stroke="#000" stroke-width="1.5" />
  <text x="690" y="660" font-size="14" font-weight="bold" text-anchor="middle" fill="#000">D4</text>
  <text x="765" y="660" font-size="14" text-anchor="middle" fill="#000">Orders DB</text>

  <!-- Data Flows -->
  <line x1="500" y1="150" x2="500" y2="220" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)" />
  <text x="510" y="190" font-size="12" fill="#000">New Order JSON</text>

  <line x1="500" y1="290" x2="500" y2="360" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)" />
  <text x="510" y="330" font-size="12" fill="#000">Publish Message</text>

  <path d="M 500" fill="none" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)" />
  <path d="M 500 410 L 500 450 L 255 450 L 255 490" fill="none" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)" />
  <text x="265" y="475" font-size="12" fill="#000">Fanout Event</text>

  <line x1="500" y1="410" x2="500" y2="490" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)" />
  <text x="510" y="475" font-size="12" fill="#000">Fanout Event</text>

  <path d="M 500 410 L 500 450 L 745 450 L 745 490" fill="none" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)" />
  <text x="755" y="475" font-size="12" fill="#000">Fanout Event</text>

  <!-- Consumers to DBs -->
  <line x1="255" y1="560" x2="255" y2="630" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)" />
  <text x="265" y="600" font-size="12" fill="#000">Payment Status</text>

  <line x1="500" y1="560" x2="500" y2="630" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)" />
  <text x="510" y="600" font-size="12" fill="#000">Stock Deducted</text>

  <line x1="745" y1="560" x2="745" y2="630" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)" />
  <text x="755" y="600" font-size="12" fill="#000">Order Record</text>

</svg>

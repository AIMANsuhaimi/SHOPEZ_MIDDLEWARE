<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="100%" height="100%" style="background-color: white; font-family: Arial, sans-serif;">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#000" />
    </marker>
  </defs>

  <text x="400" y="40" font-size="20" font-weight="bold" text-anchor="middle" fill="#000">System Workflow Flowchart</text>

  <!-- 1. Start -->
  <rect x="320" y="80" width="160" height="40" rx="20" ry="20" fill="#fff" stroke="#000" stroke-width="1.5" />
  <text x="400" y="105" font-size="14" text-anchor="middle" fill="#000">START</text>

  <line x1="400" y1="120" x2="400" y2="160" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)" />

  <!-- 2. UI Action -->
  <polygon points="320,160 480,160 460,200 300,200" fill="#fff" stroke="#000" stroke-width="1.5" />
  <text x="390" y="185" font-size="14" text-anchor="middle" fill="#000">User Submits Order</text>

  <line x1="400" y1="200" x2="400" y2="240" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)" />

  <!-- 3. API Process -->
  <rect x="310" y="240" width="180" height="40" fill="#fff" stroke="#000" stroke-width="1.5" />
  <text x="400" y="265" font-size="14" text-anchor="middle" fill="#000">Order API builds JSON</text>

  <line x1="400" y1="280" x2="400" y2="320" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)" />

  <!-- 4. Producer Publish -->
  <rect x="290" y="320" width="220" height="40" fill="#fff" stroke="#000" stroke-width="1.5" />
  <text x="400" y="345" font-size="14" text-anchor="middle" fill="#000">Producer Publishes Message</text>

  <line x1="400" y1="360" x2="400" y2="400" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)" />

  <!-- 5. RabbitMQ Fanout -->
  <rect x="150" y="400" width="500" height="4" fill="#000" />
  <text x="400" y="390" font-size="12" font-style="italic" text-anchor="middle" fill="#000">Fanout Exchange</text>

  <!-- Fork lines down -->
  <line x1="200" y1="404" x2="200" y2="450" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)" />
  <line x1="400" y1="404" x2="400" y2="450" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)" />
  <line x1="600" y1="404" x2="600" y2="450" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)" />

  <!-- 6. Consumers (Parallel) -->
  <rect x="120" y="450" width="160" height="50" fill="#fff" stroke="#000" stroke-width="1.5" />
  <text x="200" y="470" font-size="12" font-weight="bold" text-anchor="middle" fill="#000">Payment Consumer</text>
  <text x="200" y="490" font-size="12" text-anchor="middle" fill="#000">Processes Payment</text>

  <rect x="320" y="450" width="160" height="50" fill="#fff" stroke="#000" stroke-width="1.5" />
  <text x="400" y="470" font-size="12" font-weight="bold" text-anchor="middle" fill="#000">Inventory Consumer</text>
  <text x="400" y="490" font-size="12" text-anchor="middle" fill="#000">Deducts Stock</text>

  <rect x="520" y="450" width="160" height="50" fill="#fff" stroke="#000" stroke-width="1.5" />
  <text x="600" y="470" font-size="12" font-weight="bold" text-anchor="middle" fill="#000">Order Consumer</text>
  <text x="600" y="490" font-size="12" text-anchor="middle" fill="#000">Logs to Database</text>

  <!-- Lines down to Join -->
  <line x1="200" y1="500" x2="200" y2="550" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)" />
  <line x1="400" y1="500" x2="400" y2="550" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)" />
  <line x1="600" y1="500" x2="600" y2="550" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)" />

  <!-- 7. Join Bar -->
  <rect x="150" y="550" width="500" height="4" fill="#000" />
  <text x="400" y="575" font-size="12" font-style="italic" text-anchor="middle" fill="#000">Consumers Send Acknowledgments</text>

  <line x1="400" y1="554" x2="400" y2="600" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)" />

  <!-- 8. End -->
  <rect x="320" y="600" width="160" height="40" rx="20" ry="20" fill="#fff" stroke="#000" stroke-width="1.5" />
  <text x="400" y="625" font-size="14" text-anchor="middle" fill="#000">END</text>

</svg>
